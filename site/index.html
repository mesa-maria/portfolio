<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link href="./style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="desktop-container">
      <div class="desktop">
        <div class="desktop-grid">
          <span class="desktop-grid-item">
            <button class="desktop-grid-item-button">
              <img src="assets/icons/folder.png" class="grid-icon" />
            </button>
          </span>
          <span class="desktop-grid-item">
            <img src="assets/icons/Icones_pixel.png" class="grid-icon" />
          </span>
          <span class="desktop-grid-icon">
            <button class="desktop-grid-item-button">
              <img src="assets/icons/music.png" class="grid-icon" />
            </button>
          </span>
        </div>
        <div class="desktop-toolbar">
          <button class="toolbar-button button-start">
            <img src="assets/icons/Icones_pixel.png" class="tray-icon" />
            inicio
          </button>
          <div class="toolbar-spacer"></div>
          <div class="toolbar-tray">
            <span class="tray-icon">
              <img src="assets/icons/Icones_pixel.png" class="tray-icon" />
            </span>
            <span class="tray-icon">📶</span>
            <span class="tray-icon">📧</span>
            <span class="tray-icon">🖥</span>
            <div class="tray-clock">12:30</div>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
